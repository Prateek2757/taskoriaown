<svg xmlns="http://www.w3.org/2000/svg" viewBox="430 170 4200 1060" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">Taskoria Premium Logo</title>
  <desc id="desc">Premium refined Taskoria logo using the original icon geometry with subtle gradient, depth, and polished wordmark.</desc>
  <defs>
    <!-- Premium blue gradient: keeps the existing Taskoria color language but adds depth -->
    <linearGradient id="taskoriaIconGradient" x1="474" y1="223" x2="1574" y2="1189" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#163FE8"/>
      <stop offset="0.52" stop-color="#2468F2"/>
      <stop offset="1" stop-color="#42B7FF"/>
    </linearGradient>

<linearGradient
    id="taskoriaWordGradient"
    x1="2500"
    y1="180"
    x2="2500"
    y2="900"
    gradientUnits="userSpaceOnUse"
>
    <stop offset="0%" stop-color="#2388FF"/>
    <stop offset="55%" stop-color="#1F5EF0"/>
    <stop offset="100%" stop-color="#123FE9"/>
</linearGradient>

    <linearGradient id="taskoriaHighlight" x1="520" y1="235" x2="1475" y2="915" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="iconLift" x="420" y="160" width="1220" height="1130" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#0B35C9" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0B35C9" flood-opacity="0.08"/>
    </filter>

    <filter id="wordLift" x="1300" y="190" width="3600" height="930" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#0B35C9" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Original Taskoria mark geometry preserved -->
  <g transform="translate(474 223) scale(0.78) translate(-474 -223)" filter="url(#iconLift)">
    <path d="M1089 1189.5H1076L1061.5 1179L961.5 1027L957.5 1014L1085.5 741L1233.5 446L1236.5 438L1234.5 431L1223 422.5L596 421.5L585.5 413L477.5 249L474.5 235L483 225.5L1516 223.5L1558 224.5L1572.5 235L1573.5 247L1569.5 257L1498.5 388L1386.5 607L1121.5 1142L1101.5 1180L1089 1189.5Z" fill="url(#taskoriaIconGradient)"/>
    <path d="M903 924.5H899L889.5 914L821.5 811L829.5 790L868.5 719L865.5 707L852 701.5L760 690.5L751 685.5L649.5 534L645.5 521L650 515.5L1093 513.5L1099.5 518L1101.5 528L903 924.5Z" fill="url(#taskoriaIconGradient)"/>

    <!-- Very subtle premium gloss overlay; shape remains unchanged -->
    <path d="M1089 1189.5H1076L1061.5 1179L961.5 1027L957.5 1014L1085.5 741L1233.5 446L1236.5 438L1234.5 431L1223 422.5L596 421.5L585.5 413L477.5 249L474.5 235L483 225.5L1516 223.5L1558 224.5L1572.5 235L1573.5 247L1569.5 257L1498.5 388L1386.5 607L1121.5 1142L1101.5 1180L1089 1189.5Z" fill="url(#taskoriaHighlight)" opacity="0.55"/>
    <path d="M903 924.5H899L889.5 914L821.5 811L829.5 790L868.5 719L865.5 707L852 701.5L760 690.5L751 685.5L649.5 534L645.5 521L650 515.5L1093 513.5L1099.5 518L1101.5 528L903 924.5Z" fill="url(#taskoriaHighlight)" opacity="0.45"/>
  </g>

  <!-- Premium wordmark: same name, cleaner gradient and softer optical depth -->
  <text
    x="1450"
    y="640"
    fill="url(#taskoriaWordGradient)"
    font-size="780"
    font-family="Inter, Poppins, Arial, Helvetica, sans-serif"
    font-weight="800"
    letter-spacing="-16"
    text-anchor="start"
    dominant-baseline="middle"
    filter="url(#wordLift)">Taskoria</text>
</svg>
